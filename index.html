<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 太空单词探险</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Noto Sans SC,sans-serif;background:#f5f0e8;color:#5c4e3d;min-height:100vh}
#starfield{display:none}
.nav{display:flex;background:#e8e0d0;-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-bottom:2px solid #c4b99c;position:sticky;top:0;z-index:100;border-radius:0 0 20px 20px;margin:0 8px}
.nav-btn{flex:1;min-width:80px;padding:12px 6px;border:none;background:transparent;font-size:13px;font-weight:600;font-family:Noto Sans SC,sans-serif;color:#a0937d;cursor:pointer;border-radius:14px;margin:4px;letter-spacing:1px}
.nav-btn.active{color:#5c4e3d;background:#d6cdb8}
.view{display:none;max-width:620px;margin:0 auto;padding:12px;animation:fadeIn .4s ease;z-index:2}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.dashboard{display:flex;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap;padding-top:6px}
.dash-item{background:#e8e0d0;border:1px solid #d6cdb8;border-radius:12px;padding:6px 12px;text-align:center;min-width:70px;flex:1;max-width:120px}
.dash-item .dash-label{font-size:9px;font-family:Noto Sans SC,sans-serif;color:#a0937d;letter-spacing:1px}
.dash-item .dash-value{font-size:20px;font-weight:900;font-family:Noto Sans SC,sans-serif;color:#5c4e3d}
.flashcard-wrap{perspective:1000px;margin:0 auto;width:100%;max-width:400px;min-height:160px;cursor:pointer}
.flashcard-inner{transition:transform .5s;transform-style:preserve-3d}
.flashcard{position:absolute;top:0;left:0;width:100%;min-height:160px;backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 20px}
.flashcard-wrap.flipped .flashcard-inner{transform:rotateY(180deg)}
.flashcard-front{background:#e8e0d0;border:2px solid #d6cdb8}
.flashcard-back{background:#e8e0d0;border:2px solid #d6cdb8;transform:rotateY(180deg)}
.flashcard .word{font-size:26px;font-weight:700;font-family:Noto Sans SC,sans-serif;color:#4a6fa5;margin-bottom:4px}
.flashcard .phonetic{font-size:12px;color:#a0937d;margin-bottom:3px}
.flashcard .pos{font-size:11px;color:#6b8c5e;padding:2px 10px;background:#d6cdb8;border-radius:10px;display:inline-block}
.flashcard .meaning-ref{font-size:16px;color:#5c4e3d;padding:8px 16px;background:#ddd4c2;border-radius:12px;display:inline-block;border:1px solid #c4b99c}
.btn{padding:8px 20px;border:2px solid #c4b99c;border-radius:12px;font-size:13px;font-weight:700;font-family:Noto Sans SC,sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:6px;letter-spacing:1px}
.btn-know{background:#d6cdb8;color:#5c4e3d}
.btn-skip{background:#e8d5c0;color:#a5634e}
.quiz-opt-big{padding:10px 10px;border:2px solid #d6cdb8;border-radius:12px;background:#efe8da;font-size:14px;color:#5c4e3d;cursor:pointer;text-align:center;min-height:40px;display:flex;align-items:center;justify-content:center;transition:transform .15s,background .15s,border-color .15s}
.quiz-opt-big:hover:not(:disabled){border-color:#b0a58e;background:#e8e0d0}
.quiz-opt-big.correct-pulse{border-color:#6b8c5e!important;background:#d4e0c8!important;color:#4a6b3e!important;animation:pulseGreen .5s ease}
.quiz-opt-big.wrong-shake{border-color:#c46a5a!important;background:#e8cdc4!important;color:#a5634e!important;animation:shake .4s ease}
@keyframes pulseGreen{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}50%{transform:translateX(8px)}70%{transform:translateX(-6px)}85%{transform:translateX(6px)}}
.mode-btn{padding:6px 12px;border:1px solid #d6cdb8;border-radius:16px;background:transparent;font-size:11px;font-family:Noto Sans SC,sans-serif;color:#a0937d;cursor:pointer;letter-spacing:1px}
.mode-btn.active{border-color:#b0a58e;background:#d6cdb8;color:#5c4e3d}
.mascot{position:fixed;bottom:16px;right:16px;font-size:32px;z-index:10;animation:floatMascot 4s ease-in-out infinite;pointer-events:none;opacity:.6}
@keyframes floatMascot{0%,100%{transform:translateY(0)}25%{transform:translateY(-8px)}50%{transform:translateY(-3px)}}
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#e8e0d0;border:1px solid #d6cdb8;color:#5c4e3d;padding:10px 24px;border-radius:24px;font-size:14px;z-index:300;opacity:0;text-align:center;pointer-events:none}
.toast.show{opacity:1}
.victory-overlay{display:none;position:fixed;inset:0;z-index:600;justify-content:center;align-items:center;background:rgba(92,78,61,.3)}
.victory-overlay.active{display:flex}
.victory-card{background:#e8e0d0;border:2px solid #d6cdb8;border-radius:24px;padding:28px 36px;text-align:center;animation:victoryIn .6s ease;max-width:90%}
@keyframes victoryIn{0%{transform:scale(.5) rotateY(90deg);opacity:0}100%{transform:scale(1) rotateY(0);opacity:1}}
.victory-card h2{font-family:Noto Sans SC,sans-serif;font-size:24px;color:#4a6fa5;margin-bottom:8px}
.victory-card p{font-size:16px;color:#a0937d;margin-bottom:16px}
.btn-victory{padding:12px 36px;border:2px solid #d6cdb8;border-radius:16px;background:#d6cdb8;color:#5c4e3d;font-size:16px;font-family:Noto Sans SC,sans-serif;cursor:pointer;letter-spacing:2px}
#celebrationCanvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:500;pointer-events:none;display:none}
#celebrationCanvas.active{display:block;pointer-events:auto}
.btn-speak{background:#ddd4c2;border:1px solid #c4b99c;border-radius:50%;width:34px;height:34px;font-size:16px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
.flip-hint{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-size:10px;color:#b0a58e}
.empty-state{text-align:center;padding:30px 16px;color:#a0937d;background:#e8e0d0;border-radius:16px}
.result-msg{min-height:20px;font-size:14px;font-weight:700;margin-top:4px}
.action-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.modal{background:#e8e0d0;border-radius:16px;border:1px solid #d6cdb8;padding:24px;width:100%;max-width:480px;color:#5c4e3d}
.modal h3{color:#4a6fa5;font-family:Noto Sans SC,sans-serif}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(92,78,61,.2);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);z-index:200;justify-content:center;align-items:center;padding:16px}
.modal-overlay.show{display:flex}
.modal textarea,.modal input{width:100%;padding:10px 14px;border:2px solid #d6cdb8;border-radius:10px;font-size:14px;font-family:inherit;outline:none;background:#f5f0e8;color:#5c4e3d}
.modal textarea:focus,.modal input:focus{border-color:#b0a58e}
.modal textarea{min-height:80px;resize:vertical}
.modal label{display:block;font-size:13px;font-weight:600;margin:12px 0 4px;color:#a0937d}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.btn-outline{background:transparent;border:2px solid #c4b99c;color:#5c4e3d;padding:8px 20px;border-radius:12px;font-size:13px;font-family:Noto Sans SC,sans-serif;cursor:pointer}
.btn-outline:hover{background:#ddd4c2}
.btn-primary{background:#d6cdb8;border:2px solid #c4b99c;color:#5c4e3d;padding:8px 20px;border-radius:12px;font-size:13px;font-family:Noto Sans SC,sans-serif;cursor:pointer}
.btn-primary:hover{background:#c4b99c}
.quiz-options-review{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:400px;margin:10px auto 6px}
.spell-card{background:#e8e0d0;border:2px solid #d6cdb8;border-radius:20px;padding:28px 24px;max-width:420px;margin:10px auto;text-align:center}
.spell-meaning{font-size:24px;font-weight:700;color:#4a6fa5;margin-bottom:6px;line-height:1.4}
.spell-pos{font-size:12px;color:#6b8c5e;background:#d6cdb8;border-radius:10px;padding:2px 10px;display:inline-block;margin-bottom:10px}
.spell-example{font-size:13px;color:#7a6e5a;background:#f5f0e8;border-radius:10px;padding:8px 12px;margin:6px 0 14px;border:1px dashed #d6cdb8}
.spell-input-row{margin:16px 0 10px}
.spell-input{width:90%;max-width:280px;padding:12px 16px;border:2px solid #d6cdb8;border-radius:14px;font-size:20px;text-align:center;font-family:Noto Sans SC,sans-serif;outline:none;background:#f5f0e8;color:#5c4e3d;letter-spacing:2px}
.spell-input:focus{border-color:#8a9eb0}
.spell-wrong{border-color:#c46a5a!important;background:#f5e4de!important;animation:shake .4s ease}
.spell-hint{font-size:14px;color:#a0937d;min-height:22px;margin:4px 0}
.spell-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px}
/* ===== 响应式 ===== */
@media(max-width:480px){
  .view{padding:8px}
  .dashboard{gap:6px}.dash-item{padding:4px 8px;min-width:60px}.dash-item .dash-value{font-size:16px}
  .flashcard-wrap{max-width:100%;min-height:140px}.flashcard{min-height:140px;padding:12px 16px}
  .flashcard .word{font-size:22px}.flashcard .meaning-ref{font-size:14px;padding:6px 12px}
  .quiz-opt-big{padding:8px 8px;min-height:36px;font-size:13px}
  .quiz-options-review{gap:6px}
  .mode-btn{padding:5px 10px;font-size:10px}
  .nav-btn{padding:10px 4px;font-size:12px}
  .spell-meaning{font-size:20px}.spell-input{font-size:18px;padding:10px 12px;width:95%}.spell-card{padding:20px 16px}
  .mascot{font-size:26px;bottom:10px;right:10px}
  .btn{padding:6px 14px;font-size:12px}
  .plan-stat{font-size:12px}
  .word-row{font-size:12px;padding:4px 6px}
}
@media(min-width:481px) and (max-width:767px){
  .view{padding:10px;max-width:100%}
  .flashcard .word{font-size:24px}
  .quiz-opt-big{padding:9px 10px;min-height:38px}
}
/* iPad 横屏 / 小桌面 */
@media(min-width:768px){
  .view{max-width:720px;padding:20px}
  .flashcard-wrap{max-width:420px;min-height:180px}.flashcard{min-height:180px}
  .flashcard .word{font-size:28px}
  .quiz-opt-big{padding:12px 14px;min-height:44px;font-size:15px}
  .spell-card{max-width:480px}.spell-meaning{font-size:26px}
}
/* 大屏优化 */
@media(min-width:1024px){
  .view{max-width:800px}
  .flashcard-wrap{max-width:460px;min-height:190px}
  .flashcard .word{font-size:30px}
}
/* 触摸反馈 */
@media(hover:none){
  .quiz-opt-big:active{border-color:#b0a58e;background:#d6cdb8;transform:scale(0.97)}
  .mode-btn:active,.nav-btn:active{opacity:.7}
  .btn-speak:active{background:#c4b99c;transform:scale(0.92)}
  .btn:active{transform:scale(0.96)}
  .word-row .w-actions button:active{background:#d6cdb8}
}
/* 横屏禁止缩放 */
@media screen and (orientation:landscape) and (max-height:500px){
  .dashboard{display:none}.mode-selector{display:none}
  .flashcard-wrap{min-height:120px}.flashcard{min-height:120px;padding:8px 12px}
  .flashcard .word{font-size:18px}.quiz-options-review{gap:4px}.quiz-opt-big{padding:4px 6px;min-height:28px;font-size:11px}
}
.settings-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:12px;padding:8px 16px;background:#e8e0d0;border-radius:12px}
.settings-row label{font-size:12px;color:#7a6e5a;display:inline-flex;align-items:center;gap:6px}
.settings-row input[type=number]{width:48px;padding:3px 6px;border:1px solid #d6cdb8;border-radius:6px;background:#f5f0e8;color:#5c4e3d;font-size:12px}
.settings-row input[type=checkbox]{accent-color:#8a7e6a}
.mgmt-toolbar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.search-box{width:100%;padding:10px 14px;border:2px solid #d6cdb8;border-radius:12px;font-size:14px;font-family:inherit;outline:none;background:#f5f0e8;color:#5c4e3d;margin-bottom:10px}
.search-box:focus{border-color:#b0a58e}
#wordTableContainer{background:#e8e0d0;border-radius:12px;padding:8px;border:1px solid #d6cdb8}
.word-row{display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:1px solid #d6cdb8;font-size:13px}
.word-row:last-child{border-bottom:none}
.word-row .w-word{font-weight:600;color:#4a6fa5;min-width:80px}
.word-row .w-meaning{color:#5c4e3d;flex:1}
.word-row .w-stage{font-size:11px;color:#a0937d;min-width:50px;text-align:right}
.word-row .w-actions{display:flex;gap:4px}
.word-row .w-actions button{background:none;border:1px solid #d6cdb8;border-radius:6px;cursor:pointer;padding:2px 8px;font-size:11px;color:#7a6e5a}
.word-row .w-actions button:hover{background:#ddd4c2}
.word-table{width:100%;border-collapse:collapse;font-size:13px}
.word-table th{padding:8px 10px;text-align:left;background:#d6cdb8;color:#5c4e3d;font-weight:600;border-bottom:2px solid #c4b99c}
.word-table td{padding:8px 10px;border-bottom:1px solid #d6cdb8}
.word-table tr:hover td{background:#ddd4c2}
.btn-sm{border:1px solid #d6cdb8;border-radius:6px;cursor:pointer;padding:4px 8px;font-size:12px;background:#f5f0e8;color:#5c4e3d;margin:0 2px}
.btn-sm:hover{background:#d6cdb8}
.stage-badge{padding:2px 8px;border-radius:6px;font-size:11px;background:#d6cdb8;color:#5c4e3d}
.word-table-wrap{overflow-x:auto}
.plan-summary{background:#e8e0d0;border-radius:14px;padding:16px;border:1px solid #d6cdb8;margin-bottom:12px}
.plan-summary h3,.plan-list h4{font-family:Noto Sans SC,sans-serif;color:#4a6fa5;margin-bottom:8px;font-size:16px}
.plan-stat{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #d6cdb8;font-size:13px;color:#5c4e3d}
.plan-stat:last-child{border-bottom:none}
.plan-list{background:#e8e0d0;border-radius:14px;padding:16px;border:1px solid #d6cdb8}
.flip-example{font-size:12px;color:#7a6e5a;margin-top:6px;padding:6px 10px;background:#f5f0e8;border-radius:8px;border:1px dashed #d6cdb8;max-width:90%}
.trend-bars{display:flex;gap:6px;justify-content:center;align-items:flex-end;height:60px;padding:8px 4px}
.trend-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.trend-bar{width:100%;max-width:28px;border-radius:4px 4px 0 0;min-height:2px;transition:height .3s}
.trend-label{font-size:9px;color:#a0937d;white-space:nowrap}
/* ===== 登录界面 ===== */
#loginOverlay{display:none;position:fixed;inset:0;z-index:999;background:#f5f0e8;justify-content:center;align-items:center;padding:20px}
#loginOverlay.active{display:flex}
.login-card{background:#e8e0d0;border:2px solid #d6cdb8;border-radius:24px;padding:32px 28px;width:100%;max-width:360px;text-align:center}
.login-card h2{color:#4a6fa5;font-size:22px;margin-bottom:4px}
.login-card p{color:#a0937d;font-size:13px;margin-bottom:20px}
.login-select{width:100%;padding:12px 16px;border:2px solid #d6cdb8;border-radius:14px;font-size:15px;font-family:inherit;outline:none;background:#f5f0e8;color:#5c4e3d;margin-bottom:12px;-webkit-appearance:none;appearance:none}
.login-select:focus{border-color:#8a9eb0}
.login-input{width:100%;padding:12px 16px;border:2px solid #d6cdb8;border-radius:14px;font-size:15px;font-family:inherit;outline:none;background:#f5f0e8;color:#5c4e3d;margin-bottom:12px}
.login-input:focus{border-color:#8a9eb0}
.login-btn{width:100%;padding:12px;border:none;border-radius:14px;background:#4a6fa5;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:Noto Sans SC,sans-serif}
.login-btn:hover{background:#3a5a8a}
.login-error{color:#a5634e;font-size:13px;margin-top:8px;min-height:20px}
.student-list{max-height:200px;overflow-y:auto;margin-bottom:12px}
.student-opt{padding:10px 14px;border:1px solid #d6cdb8;border-radius:10px;margin-bottom:4px;cursor:pointer;font-size:14px;background:#f5f0e8;text-align:left}
.student-opt:hover{background:#d6cdb8}
.student-opt.selected{background:#d6cdb8;border-color:#8a9eb0;font-weight:600}
.user-badge{display:inline-flex;align-items:center;gap:6px;background:#d6cdb8;border-radius:20px;padding:4px 14px 4px 10px;font-size:12px;color:#5c4e3d;cursor:pointer;margin-left:auto}
.user-badge:hover{background:#c4b99c}
</style>
</head>
<body>
<div id="starfield"></div>
<div class="mascot">🚀</div>

<nav class="nav" id="topNav">
  <button class="nav-btn active" data-view="study">📖 学习</button>
  <button class="nav-btn" data-view="plan">📅 计划</button>
  <button class="nav-btn" data-view="manage">📚 单词管理</button>
  <span class="user-badge" id="userBadge" onclick="showLogin()">👤 未登录</span>
</nav>

<div class="view active" id="viewStudy">
<div class="dashboard"><div class="dash-item"><div class="dash-label">今日新星</div><div class="dash-value" id="dashToday">0</div></div><div class="dash-item"><div class="dash-label">累计星云</div><div class="dash-value" id="dashTotal">0</div></div><div class="dash-item"><div class="dash-label">当前燃料</div><div class="dash-value" id="dashErrorCount">0</div></div></div>

  <div class="mode-selector" id="modeSelector">
    <button class="mode-btn active" data-mode="review">🔄 复习</button>
    <button class="mode-btn" data-mode="new">🆕 学新词</button>
    <button class="mode-btn" data-mode="spelling">✍️ 拼写</button>
    <button class="mode-btn" data-mode="error-review">📕 错题本</button>
    <button class="mode-btn" data-mode="mixed">🎯 混合</button>
  </div>
  <div class="flashcard-area" id="flashcardArea"><!-- JS填充 --></div>
  <div class="settings-row">
    <label><input type="checkbox" id="autoSpeak" checked> 🔊 答对自动朗读</label>
    <label>每日新词上限 <input type="number" id="dailyNewLimit" value="10" min="1" max="50"></label>
  </div>
</div>

<div class="view" id="viewPlan"><!-- JS填充 --></div>

<div class="view" id="viewManage">
  <div class="mgmt-toolbar">
    <button class="btn btn-outline" id="btnAddWord">➕ 添加</button>
    <button class="btn btn-outline" id="btnImport">📥 导入</button>
    <button class="btn btn-outline" id="btnExport">📤 导出</button>
    <button class="btn btn-outline" id="btnResetProgress">🔄 重置进度</button>
    <button class="btn btn-outline" id="btnResetAll">🗑 完全重置</button>
  </div>
  <input type="text" class="search-box" id="wordSearch" placeholder="🔍 搜索单词...">
  <div id="wordTableContainer"><!-- JS填充 --></div>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalBody"><!-- JS填充 --></div></div>
<div class="toast" id="toast"></div>

<!-- ===== 登录界面 ===== -->
<div class="modal-overlay" id="loginOverlay"><div class="login-card" id="loginCard">
  <h2>🚀 太空单词探险</h2>
  <p>请先选择班级和姓名</p>
  <select class="login-select" id="loginClass" onchange="onClassChange()"><option value="">— 选择班级 —</option></select>
  <div class="student-list" id="studentList"></div>
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;"><hr style="flex:1;border:none;border-top:1px solid #d6cdb8"><span style="color:#a0937d;font-size:12px;">或者</span><hr style="flex:1;border:none;border-top:1px solid #d6cdb8"></div>
  <input type="text" class="login-input" id="newStudentName" placeholder="输入新姓名创建新学生...">
  <button class="login-btn" onclick="doLogin()">🚀 开始学习</button>
  <div class="login-error" id="loginError"></div>
</div></div>

<script>
/* ================================================================
   1. 数据结构
   ================================================================ */
const STORAGE_KEY = 'WordFlashcardsData';
var STATS_KEY = 'WordFlashcardsStats';
var ERROR_KEY = 'WordFlashcardsErrorBook';
var celebrationAnimationId = null;

// ===== 纯前端多用户系统（localStorage 存储） =====
var currentUser = JSON.parse(localStorage.getItem('WordFlashcardUser') || 'null');
const USERS_KEY = 'WordFlashcardAllUsers';

function getAllUsers(){
  try{return JSON.parse(localStorage.getItem(USERS_KEY))||{};}catch(e){return {};}
}
function saveAllUsers(u){localStorage.setItem(USERS_KEY,JSON.stringify(u));}

function getClassStudents(){
  var users=getAllUsers();
  var result={};
  for(var key in users){
    var u=users[key];
    if(!result[u.class])result[u.class]=[];
    result[u.class].push({id:key,name:u.name});
  }
  return result;
}

function showLogin(){
  document.getElementById('loginOverlay').classList.add('active');
  renderClassList();
}
function hideLogin(){
  document.getElementById('loginOverlay').classList.remove('active');
}

function renderClassList(){
  var data=getClassStudents();
  var sel=document.getElementById('loginClass');
  sel.innerHTML='<option value="">— 选择班级 —</option>';
  var classNames=Object.keys(data);
  if(classNames.length===0)classNames=['三年级一班','三年级二班','四年级一班'];
  classNames.forEach(function(c){
    var count=data[c]?data[c].length:0;
    sel.innerHTML+='<option value="'+c+'">'+c+(count?' ('+count+'人)':'')+'</option>';
  });
  if(currentUser&&currentUser.class)sel.value=currentUser.class;
  onClassChange();
}

function onClassChange(){
  var classId=document.getElementById('loginClass').value;
  var list=document.getElementById('studentList');
  if(!classId){list.innerHTML='';return;}
  var data=getClassStudents();
  var students=data[classId]||[];
  var html='';
  students.forEach(function(s){
    var selected=(currentUser&&currentUser.id===s.id)?' selected':'';
    html+='<div class="student-opt'+selected+'" data-id="'+s.id+'" onclick="selectStudent(this,\''+s.id+'\')">'+s.name+'</div>';
  });
  list.innerHTML=html;
  selectedStudentId=currentUser?currentUser.id:null;
}

var selectedStudentId=currentUser?currentUser.id:null;

function selectStudent(el,id){
  selectedStudentId=id;
  document.querySelectorAll('.student-opt').forEach(function(e){e.classList.remove('selected');});
  if(el)el.classList.add('selected');
  document.getElementById('newStudentName').value='';
}

function doLogin(){
  var classId=document.getElementById('loginClass').value;
  var newName=document.getElementById('newStudentName').value.trim();
  var errorEl=document.getElementById('loginError');
  if(!classId){errorEl.textContent='请先选择班级';return;}

  if(selectedStudentId){
    var users=getAllUsers();
    var user=users[selectedStudentId];
    if(user){setCurrentUser({id:selectedStudentId,name:user.name,class:user.class});hideLogin();initApp();return;}
  }

  if(newName){
    var users=getAllUsers();
    var id='u_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    users[id]={name:newName,class:classId};
    saveAllUsers(users);
    setCurrentUser({id:id,name:newName,class:classId});
    // 为新用户复制默认词库
    if(!localStorage.getItem(STORAGE_KEY+'_'+id)){
      var words=initData().words;
      localStorage.setItem(STORAGE_KEY+'_'+id,JSON.stringify(words));
    }
    hideLogin();
    initApp();
    return;
  }
  errorEl.textContent='请选择已有学生或输入新姓名';
}

function setCurrentUser(user){
  currentUser=user;
  localStorage.setItem('WordFlashcardUser',JSON.stringify(user));
  var badge=document.getElementById('userBadge');
  if(badge)badge.innerHTML='👤 '+user.name+' <small style="font-size:10px;">[切换]</small>';
  // 切换用户时重新加载数据
  _wordsCache=null;
}

function switchUser(){
  currentUser=null;
  selectedStudentId=null;
  localStorage.removeItem('WordFlashcardUser');
  _wordsCache=null;
  showLogin();
}

  var key=currentUser?userKey(STORAGE_KEY):STORAGE_KEY;

/* ================================================================
   3. 模糊匹配
   ================================================================ */
function fuzzyMatch(userInput, standardMeaning) {
  if (!userInput || !standardMeaning) return false;
  function normalize(s) {
    return s.trim()
      .replace(/[！-～]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0))
      .replace(/[，。！？、；：""''（）【】《》\.,!?;:'"()\[\]{}<>\/\s\-–—]+/g, ' ')
      .replace(/\s+/g, ' ').trim().toLowerCase();
  }
  const normInput = normalize(userInput);
  if (!normInput) return false;
  const parts = standardMeaning.split(/[；;\/]/).map(s => normalize(s)).filter(Boolean);
  for (const part of parts) { if (normInput === part) return true; }
  const inputTokens = normInput.split(/\s+/);
  for (const token of inputTokens) {
    if (!token) continue;
    for (const part of parts) { if (part.includes(token)) return true; }
  }
  for (const part of parts) { if (part.includes(normInput) && normInput.length >= 1) return true; }
  return false;
}

   ================================================================ */
let speechSynthReady = false;
let speechVoices = [];
let speechRate = 0.85;
let speechBusy = false;
function initSpeech() {
  if (!speechSynthReady) {
    speechVoices = speechSynthesis.getVoices();
    if (speechVoices.length === 0) {
      speechSynthesis.addEventListener('voiceschanged', () => {
        speechVoices = speechSynthesis.getVoices();
      }, { once: true });
    }
    speechSynthReady = true;
  }
}
function speakWord(word) {
  if (!word) return;
  // iOS Safari 限制: speak() 必须由用户手势同步触发，且连续调用需要间隔
  speechSynthesis.cancel();
  // 加一个小延迟确保 cancel 生效（尤其 iOS）
  setTimeout(() => {
    const u = new SpeechSynthesisUtterance(word);
    u.lang = 'en-US';
    u.rate = speechRate || 0.85;
    // 优先选择美式英语女声（iOS 上效果更好）
    if (speechVoices.length > 0) {
      const preferred = speechVoices.find(v =>
        /^(en-US|en_US|english)/i.test(v.lang) && /female|samantha|ava|zoe|美式|女生|女声/i.test(v.name)
      ) || speechVoices.find(v => /^en(-US|_US)?$/i.test(v.lang));
      if (preferred) u.voice = preferred;
    }
    speechSynthesis.speak(u);
  }, 50);
}

function endDayStats(){
  var key=userKey(STATS_KEY);
  var s=JSON.parse(localStorage.getItem(key));
  if(!s||!s.date)return;
  var todayStats={date:s.date,learned:s.todayLearned||0,correct:s.todayCorrect||0,wrong:s.todayWrong||0};
  var hist=s.dailyHistory||[];
  var found=false;
  for(var hi=0;hi<hist.length;hi++){if(hist[hi].date===s.date){hist[hi]=todayStats;found=true;break;}}
  if(!found)hist.push(todayStats);
  if(hist.length>30)hist=hist.slice(hist.length-30);
  s.dailyHistory=hist;
  if(s.todayLearned>0){s.streak=(s.streak||0)+1;}else{s.streak=0;}
  localStorage.setItem(key,JSON.stringify(s));
}

var studyState={mode:'review',queue:[],currentIndex:0,answered:false};

function normalChooseAnswer(btn){
  if(studyState.answered)return;
  var sm=btn.textContent,cm=btn.getAttribute('data-correct');
  var correct=fuzzyMatch(sm,cm);
  var data=getData();var word=studyState.queue[studyState.currentIndex];
  var msgEl=document.getElementById('resultMsg');
  var allBtns=document.querySelectorAll('.quiz-opt-big');
  if(correct){
    studyState.answered=true;
    btn.classList.add('correct-pulse');
    if(msgEl){msgEl.textContent='✅';msgEl.style.color='#81c784';}
    for(var i=0;i<allBtns.length;i++)allBtns[i].disabled=true;
    recordAnswer(true);
    var stats=getStats();stats.todayLearned=(stats.todayLearned||0)+1;stats.totalLearned=(stats.totalLearned||0)+1;
    saveStats(stats);updateDashboard();
    var w=data.words.find(function(w2){return w2.word===word.word;});
    if(w){
      w.stage=Math.min(w.stage+1,6);w.correctCount=(w.correctCount||0)+1;
      var iv=STAGE_INTERVALS[w.stage]||1;
      if(iv>=999){w.nextReviewDate=null;}else{var d=new Date();d.setDate(d.getDate()+iv);w.nextReviewDate=d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');}
      saveData(data);
    }
    var auto=document.getElementById('autoSpeak');if(auto&&auto.checked)speakWord(word.word);
    var sb=document.getElementById('btnSkipWord');if(sb)sb.style.display='none';
    setTimeout(function(){nextCard(data);},800);
  }else{
    btn.classList.add('wrong-shake');
    var self=btn;
    setTimeout(function(){self.classList.remove('wrong-shake');},400);
    if(msgEl){msgEl.textContent='❌ 再试试！';msgEl.style.color='#ef9a9a';}
    for(var i=0;i<allBtns.length;i++){if(fuzzyMatch(allBtns[i].textContent,cm))allBtns[i].classList.add('correct-pulse');}
    var sb=document.getElementById('btnSkipWord');if(sb)sb.style.display='inline-flex';
  }
}

  setTimeout(function(){nextCard(data);},800);
}

  function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);var alive=false;for(var p=0;p<particles.length;p++){var pt=particles[p];if(pt.life<=0)continue;alive=true;pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.15;pt.life-=pt.decay;ctx.fillStyle=pt.color;ctx.globalAlpha=Math.max(0,pt.life);ctx.fillRect(pt.x,pt.y,pt.size,pt.size);}if(alive){celebrationAnimationId=requestAnimationFrame(animate);}else{ctx.clearRect(0,0,canvas.width,canvas.height);canvas.classList.remove('active');showVictoryPanel();}}

}function buildStudyQueue(data, mode) {
  const today = getTodayStr();
  let queue = [];
  if (mode === 'review') queue = data.words.filter(w => w.stage < 6 && (!w.nextReviewDate || w.nextReviewDate <= today));
  else if (mode === 'new') { const nw = data.words.filter(w => w.stage === 0); queue = nw.slice(0, data.dailyNewLimit || 10); }
  else if (mode === 'spelling') { queue = data.words.filter(w => w.stage > 0 && w.stage < 6); }
  else if (mode === 'error-review') { const book = getErrorBook(); queue = data.words.filter(function(w){return book.some(function(e){return(typeof e==='object'?e.word:e)===w.word;});}); }
  else if (mode === 'mixed') { const r = data.words.filter(w => w.stage < 6 && w.nextReviewDate && w.nextReviewDate <= today); const nw = data.words.filter(w => w.stage === 0); queue = [...r, ...nw.slice(0, data.dailyNewLimit || 10)]; }
  return queue;
}

let mediaRecorder = null;
let audioChunks = [];

function toggleRecord(word) {
  if (isRecording) {
    // 停止录音
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
    isRecording = false;
    const btns = document.querySelectorAll('.record-btn');
    btns.forEach(b => { b.textContent = '🎤 跟读'; b.style.background = 'var(--cyan-light)'; });
    return;
  }
  // 开始录音
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showToast('浏览器不支持录音');
    return;
  }
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.play();
      stream.getTracks().forEach(t => t.stop());
      showToast('🎤 播放你的发音');
    };
    mediaRecorder.start();
    isRecording = true;
    const btns = document.querySelectorAll('.record-btn');
    btns.forEach(b => { b.textContent = '⏹ 停止'; b.style.background = '#ffcdd2'; });

}

// 简单音标猜测
function guessPhonetic(word) {
  if (!word || word.includes(' ')) return '/' + word + '/';
  let p = '/' + word + '/';
  if (word.endsWith('tion')) p = '/' + word.slice(0, -4) + 'ʃən/';
  else if (word.endsWith('ing') && word.length > 5) p = '/' + word.slice(0, -3) + 'ɪŋ/';
  else if (word.endsWith('ed') && word.length > 4) p = '/' + word.slice(0, -2) + 'd/';
  else if (word.endsWith('ly')) p = '/' + word.slice(0, -2) + 'li/';
  else if (word.endsWith('er')) p = '/' + word.slice(0, -2) + 'ər/';
  else if (word.endsWith('ment')) p = '/' + word.slice(0, -4) + 'mənt/';
  else if (word.endsWith('ness')) p = '/' + word.slice(0, -4) + 'nəs/';
  else if (word.endsWith('ful')) p = '/' + word + '/';
  else if (word.endsWith('ous')) p = '/' + word.slice(0, -3) + 'əs/';
  else if (word.endsWith('able')) p = '/' + word.slice(0, -4) + 'əbəl/';
  return p;
}
function guessPOS(word) {
  if (!word || word.includes(' ')) return 'phrase';
  if (word.endsWith('tion')||word.endsWith('sion')||word.endsWith('ness')||word.endsWith('ment')||word.endsWith('ity')||word.endsWith('ence')||word.endsWith('ance')) return '名词';
  if (word.endsWith('ing')||word.endsWith('ed')) return '动词';
  if (word.endsWith('ly')) return '副词';
  if (word.endsWith('ful')||word.endsWith('ous')||word.endsWith('able')||word.endsWith('ible')||word.endsWith('ive')||word.endsWith('al')||word.endsWith('less')) return '形容词';
  return '';
}

function recordResult(data, word, correct) {
  const w = data.words.find(w2 => w2.word === word.word && w2.meaning === word.meaning);
  if (!w) return;
  if (correct) {
    w.stage = Math.min(w.stage + 1, 6);
    w.correctCount = (w.correctCount || 0) + 1;
  } else {
    w.stage = Math.max(w.stage - 1, 0);
    if (w.stage === 0) w.stage = 1; // 至少回到阶段1
    w.wrongCount = (w.wrongCount || 0) + 1;
  }
  const interval = STAGE_INTERVALS[w.stage] || 1;
  if (interval >= 999) { w.nextReviewDate = null; }
  else { const d = new Date(); d.setDate(d.getDate() + interval); w.nextReviewDate = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
  saveData(data);
}

}

function openImportModal() {
  const overlay = document.getElementById('modalOverlay');
  const body = document.getElementById('modalBody');
  body.innerHTML = `
    <h3>📥 导入单词</h3>
    <p style="font-size:14px;color:var(--text-light);margin-bottom:8px;">支持纯英文单词列表（每行一个或逗号分隔）。系统自动查词典。</p>
    <label>粘贴内容</label>

    <div class="modal-actions">
      <button class="btn btn-outline" id="mCancel2">取消</button>
      <button class="btn btn-primary" id="mImport">📥 导入</button>
    </div>
  `;
  overlay.classList.add('show');
  document.getElementById('mCancel2').addEventListener('click', () => overlay.classList.remove('show'));
  document.getElementById('mImport').addEventListener('click', () => {
    const text = document.getElementById('importText').value.trim();
    if (!text) { showToast('请粘贴内容。'); return; }
    let imported;
    try { imported = tryParseImport(text); }
    catch (e) { showToast('解析失败：' + e.message); return; }
    if (!Array.isArray(imported) || imported.length === 0) { showToast('未解析到有效单词。'); return; }
    const data = getData();
    let added = 0, skipped = 0;
    for (const item of imported) {
      if (!item.word) { skipped++; continue; }
      if (data.words.some(w => w.word === item.word)) { skipped++; continue; }
      data.words.push({ word: item.word, meaning: item.meaning || '', partOfSpeech: '', example: '', stage: 0, nextReviewDate: null, correctCount: 0, wrongCount: 0 });
      added++;
    }
    saveData(data);
    overlay.classList.remove('show');
    renderManageView();
    showToast(`✅ 导入完成：新增 ${added} 个${skipped ? '，跳过 ' + skipped + ' 个' : ''}`);
    // 异步查缺少释义的单词
    fetchMissingMeanings(imported.filter(i => !i.meaning)).then(() => {
      const d = getData(); let updated = 0;
      for (const w of d.words) { if (!w.meaning) { const f = imported.find(i => i.word === w.word && i.meaning); if (f) { w.meaning = f.meaning; updated++; } } }
      if (updated) { saveData(d); renderManageView(); showToast(`🌐 联网更新了 ${updated} 个单词释义！`); }
    });
  });
}

function tryParseImport(text) {
  if (text.startsWith('[') || text.startsWith('{')) { try { return JSON.parse(text); } catch (e) {} }
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  if (lines.length > 0 && (lines[0].includes(',') || lines[0].includes('\t'))) {
    if (lines.length < 2) throw new Error('CSV 格式内容不足两行。');
    const result = []; const startIdx = lines[0].toLowerCase().includes('word') || lines[0].includes('英文') ? 1 : 0;
    for (let i = startIdx; i < lines.length; i++) { const parts = lines[i].split(/[,\t]/).map(s => s.trim().replace(/^["']|["']$/g, '')); if (parts.length >= 2) result.push({ word: parts[0], meaning: parts[1], partOfSpeech: parts[2] || '', example: parts[3] || '' }); }
    if (result.length) return result;
  }
  const words = text.split(/\n|[,，\s]+/).map(s => s.trim()).filter(Boolean);
  if (words.length) return words.map(w => { const wl = w.toLowerCase(); return { word: wl, meaning: BUILTIN_DICT[wl] || SUPPLEMENT_DICT[wl] || '' }; });
  throw new Error('未识别到有效内容。');
}

// MyMemory API
async function fetchMyMemory(word) {
  try {
    const resp = await fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(word) + '&langpair=en|zh');
    const data = await resp.json();
    if (data && data.responseData && data.responseData.translatedText) {
      const text = data.responseData.translatedText;
      if (text && text.toLowerCase() !== word.toLowerCase() && !text.includes(word.toLowerCase())) return text;
    }
  } catch (e) {}
  return '';
}
async function fetchMissingMeanings(words) {
  if (words.length === 0) return;
  showToast('🌐 正在联网查询 ' + words.length + ' 个单词释义...');
  for (let i = 0; i < words.length; i++) {
    const meaning = await fetchMyMemory(words[i].word);
    if (meaning) words[i].meaning = meaning;
  }
}

function exportData(includeRecords) {

  a.href = URL.createObjectURL(new Blob([JSON.stringify(includeRecords ? data : data.words.map(({ word, meaning, partOfSpeech, example }) => ({ word, meaning, partOfSpeech, example })), null, 2)], { type: 'application/json' }));
